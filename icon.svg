<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8f0c8"/>
      <stop offset="100%" style="stop-color:#a8e6a8"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="55%">
      <stop offset="0%" style="stop-color:#eafbea;stop-opacity:0.65"/>
      <stop offset="100%" style="stop-color:#90d990;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="scaleBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0faf0"/>
      <stop offset="100%" style="stop-color:#d4f0d4"/>
    </linearGradient>
    <linearGradient id="scaleTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8f8e8"/>
    </linearGradient>
    <linearGradient id="displayBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a"/>
      <stop offset="100%" style="stop-color:#0e2218"/>
    </linearGradient>
    <linearGradient id="footGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ecb7e"/>
      <stop offset="100%" style="stop-color:#5aa85a"/>
    </linearGradient>
    <filter id="scaleShadow" x="-15%" y="-10%" width="130%" height="135%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#2a6a2a" flood-opacity="0.22"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#iconClip)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bgGrad)"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bgGlow)"/>
  </g>

  <!-- Scale -->
  <g clip-path="url(#iconClip)" filter="url(#scaleShadow)">

    <!-- Main scale platform -->
    <rect x="172" y="310" width="680" height="560" rx="72" ry="72" fill="url(#scaleBody)" stroke="#b0ddb0" stroke-width="4"/>

    <!-- Top surface highlight -->
    <rect x="172" y="310" width="680" height="220" rx="72" ry="72" fill="url(#scaleTop)" opacity="0.7"/>

    <!-- Inner rim -->
    <rect x="200" y="338" width="624" height="504" rx="54" ry="54" fill="none" stroke="#c8ecc8" stroke-width="3"/>

    <!-- Digital display -->
    <rect x="282" y="375" width="460" height="175" rx="22" ry="22" fill="url(#displayBg)"/>
    <rect x="290" y="383" width="444" height="159" rx="16" ry="16" fill="none" stroke="#2a7a4a" stroke-width="2" opacity="0.6"/>

    <!-- Weight readout -->
    <text x="512" y="503"
      font-family="'Courier New', monospace"
      font-size="110"
      font-weight="700"
      fill="#5eff8a"
      text-anchor="middle"
      letter-spacing="3"
      opacity="0.92">172.4</text>

    <!-- lbs label -->
    <text x="512" y="535"
      font-family="'Courier New', monospace"
      font-size="28"
      fill="#3ab85a"
      text-anchor="middle"
      letter-spacing="8"
      opacity="0.75">LBS</text>

    <!-- Rubber feet -->
    <rect x="224" y="836" width="80" height="22" rx="11" fill="url(#footGrad)" opacity="0.85"/>
    <rect x="720" y="836" width="80" height="22" rx="11" fill="url(#footGrad)" opacity="0.85"/>

    <!-- Step-on dots -->
    <circle cx="410" cy="706" r="12" fill="#c0e8c0" opacity="0.6"/>
    <circle cx="512" cy="706" r="12" fill="#c0e8c0" opacity="0.6"/>
    <circle cx="614" cy="706" r="12" fill="#c0e8c0" opacity="0.6"/>

    <!-- Surface lines -->
    <line x1="220" y1="620" x2="804" y2="620" stroke="#d8f0d8" stroke-width="1.5" opacity="0.5"/>
    <line x1="220" y1="660" x2="804" y2="660" stroke="#d8f0d8" stroke-width="1.5" opacity="0.3"/>

  </g>

  <!-- Icon border -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"
        fill="none" stroke="#7ecb7e" stroke-width="8" opacity="0.35"/>
</svg>
