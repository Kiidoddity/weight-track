<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#B5C9C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Weight">
<meta name="description" content="Daily weight tracker">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Weight</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Math&family=Noto+Sans:wght@200;300;400&display=swap');
:root {
  --sage: #B5C9C0; --sage-dark: #8AADA1; --sage-deep: #5C8C80; --sage-light: #D4E3DE;
  --sage-faint: rgba(181,201,192,0.18); --bg: #e8f0ed; --ink: #1E2D29; --muted: #7A9E97;
  --surface: rgba(255,255,255,0.18); --border: rgba(255,255,255,0.45);
  --border-inner: rgba(181,201,192,0.35);
  --shadow: 0 8px 32px rgba(92,140,128,0.13), 0 1.5px 4px rgba(92,140,128,0.07);
  --up: #b83232; --down: #ffffff;
  --font: 'Noto Sans Math', 'Noto Sans', 'STIX Two Math', 'Latin Modern Math', math, sans-serif;
}
html { scroll-behavior: smooth; }
body { font-family: var(--font); font-weight: 300; background: var(--bg); color: var(--ink); min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 90% 70% at 15% -5%, rgba(181,201,192,0.55) 0%, transparent 55%), radial-gradient(ellipse 70% 80% at 95% 105%, rgba(138,173,161,0.35) 0%, transparent 50%), radial-gradient(ellipse 50% 50% at 60% 50%, rgba(212,227,222,0.2) 0%, transparent 60%); pointer-events: none; z-index: 0; }
.app { position: relative; z-index: 1; max-width: 420px; margin: 0 auto; padding: 44px 18px 80px; display: flex; flex-direction: column; gap: 14px; }
.greeting { text-align: center; margin-bottom: 4px; }
.greeting-text { font-size: 1.05rem; font-weight: 200; color: #fff; letter-spacing: 0.06em; }
.greeting-text .g-time { font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); display: block; margin-top: 3px; }
.card { background: var(--surface); backdrop-filter: blur(24px) saturate(1.4); -webkit-backdrop-filter: blur(24px) saturate(1.4); border: 1px solid var(--border); border-radius: 20px; padding: 22px 20px; box-shadow: var(--shadow); animation: fadeUp 0.45s ease both; }
.card:nth-child(2) { animation-delay:.05s } .card:nth-child(3) { animation-delay:.1s } .card:nth-child(4) { animation-delay:.15s } .card:nth-child(5) { animation-delay:.2s }
@keyframes fadeUp { from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:translateY(0) } }
.card-label { font-size: 0.56rem; letter-spacing: 0.26em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
.date-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.date-row label { font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); white-space: nowrap; cursor: pointer; user-select: none; transition: color 0.15s; }
.date-row label:hover { color: var(--sage-deep); }
.date-row input[type="date"] { flex: 1; font-family: var(--font); font-size: 0.78rem; color: var(--ink); background: rgba(255,255,255,0.28); border: 1px solid var(--border-inner); border-radius: 10px; padding: 7px 10px; outline: none; -webkit-appearance: none; cursor: pointer; }
.date-row input[type="date"]:focus { border-color: var(--sage-deep); }
.weight-field { display: flex; align-items: baseline; gap: 8px; border-bottom: 1.5px solid rgba(181,201,192,0.5); padding-bottom: 10px; margin-bottom: 14px; }
.weight-field input[type="number"] { font-family: var(--font); font-weight: 200; font-size: 3.2rem; color: #ffffff; background: none; border: none; outline: none; width: 100%; -moz-appearance: textfield; caret-color: var(--sage-deep); }
.weight-field input[type="number"]::-webkit-outer-spin-button, .weight-field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
.weight-field input[type="number"]::placeholder { color: rgba(181,201,192,0.5); }
.unit { font-size: 0.78rem; font-weight: 300; color: var(--muted); letter-spacing: 0.1em; padding-bottom: 4px; }
.log-btn { width: 100%; padding: 13px; background: var(--sage-deep); color: #fff; border: none; border-radius: 13px; font-family: var(--font); font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, transform 0.12s; box-shadow: 0 4px 16px rgba(92,140,128,0.28); }
.log-btn:hover { background: #4d7a6e; } .log-btn:active { transform: scale(0.97); }
.stat-pair { display: flex; gap: 10px; padding-top: 13px; border-top: 1px solid var(--border-inner); margin-top: 13px; }
.stat-box { flex: 1; background: var(--sage-faint); border: 1px solid var(--border-inner); border-radius: 13px; padding: 10px 13px; }
.stat-box .sb-label { font-size: 0.54rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.stat-box .sb-val { font-size: 1.25rem; font-weight: 200; color: #fff; }
.stat-box .sb-delta { font-size: 0.62rem; margin-top: 3px; letter-spacing: 0.04em; }
.sb-delta.up { color: var(--up); } .sb-delta.down { color: var(--sage-deep); } .sb-delta.same { color: var(--muted); } .sb-delta.none { color: var(--muted); }
.graph-card { padding: 0; overflow: hidden; }
.graph-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px 8px; flex-wrap: wrap; gap: 8px; }
.graph-title { font-size: 0.85rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink); font-weight: 300; }
.range-pills { display: flex; gap: 2px; background: rgba(181,201,192,0.2); border-radius: 30px; padding: 3px; border: 1px solid rgba(255,255,255,0.35); }
.range-pill { font-family: var(--font); font-size: 0.56rem; letter-spacing: 0.07em; padding: 4px 8px; border-radius: 24px; border: none; background: none; color: var(--muted); cursor: pointer; transition: background 0.16s, color 0.16s; }
.range-pill.active { background: rgba(255,255,255,0.6); color: var(--ink); box-shadow: 0 1px 5px rgba(92,140,128,0.14); }
.graph-stats { display: flex; gap: 18px; padding: 2px 20px 10px; }
.gs-label { font-size: 0.54rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 1px; }
.gs-val { font-size: 1.15rem; font-weight: 200; } .gs-unit { font-size: 0.58rem; color: var(--muted); }
.chart-box { height: 195px; padding: 0 10px 16px; }
.week-list { display: flex; flex-direction: column; gap: 7px; }
.week-row { display: flex; flex-direction: column; background: var(--sage-faint); border-radius: 12px; border: 1px solid var(--border-inner); overflow: hidden; transition: background 0.15s; }
.week-row-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 13px; cursor: pointer; user-select: none; }
.week-row-header:hover { background: rgba(181,201,192,0.15); }
.wk-chevron { font-size: 0.6rem; color: var(--muted); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); flex-shrink: 0; }
.wk-chevron.open { transform: rotate(180deg); }
.week-entries { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.22s; }
.week-entries.open { max-height: 400px; opacity: 1; }
.week-entry-list { display: flex; flex-direction: column; gap: 4px; padding: 0 10px 10px; }
.wk-entry-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 10px; background: rgba(255,255,255,0.14); border-radius: 9px; border: 1px solid rgba(181,201,192,0.2); }
.wk-entry-date { font-size: 0.68rem; color: var(--muted); } .wk-entry-dow { font-size: 0.8rem; font-weight: 300; color: var(--ink); } .wk-entry-weight { font-size: 0.95rem; font-weight: 200; color: #fff; }
.wk-label { font-size: 0.82rem; font-weight: 300; color: var(--ink); } .wk-count { font-size: 0.56rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
.wk-avg { font-size: 1.1rem; font-weight: 200; color: #fff; } .wk-avg span { font-size: 0.58rem; color: var(--muted); }
.log-collapsed { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
.lc-label { font-size: 0.56rem; letter-spacing: 0.24em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.lc-date { font-size: 0.88rem; font-weight: 300; color: #fff; } .lc-time { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.08em; margin-top: 2px; }
.lc-right { display: flex; align-items: center; gap: 10px; } .lc-weight { font-size: 1.4rem; font-weight: 200; color: #fff; }
.toggle-icon { width: 28px; height: 28px; border-radius: 50%; background: rgba(181,201,192,0.22); border: 1px solid var(--border-inner); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
.toggle-icon svg { transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); }
.toggle-icon.open { background: rgba(181,201,192,0.4); } .toggle-icon.open svg { transform: rotate(180deg); }
.log-expanded { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.28s; }
.log-expanded.open { max-height: 1200px; opacity: 1; }
.log-inner { margin-top: 14px; padding-top: 13px; border-top: 1px solid var(--border-inner); display: flex; flex-direction: column; gap: 10px; }
.log-week-header { font-size: 0.56rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); padding: 0 2px; margin-bottom: -2px; }
.log-week-group { display: flex; flex-direction: column; gap: 5px; }
.log-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; background: var(--sage-faint); border-radius: 11px; border: 1px solid var(--border-inner); transition: background 0.15s; }
.log-item:hover { background: rgba(181,201,192,0.28); }
.li-date { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.06em; } .li-time { font-size: 0.58rem; color: rgba(122,158,151,0.7); } .li-dow { font-size: 0.84rem; font-weight: 300; color: var(--ink); }
.li-right { display: flex; align-items: center; gap: 10px; } .li-delta { font-size: 0.65rem; }
.li-delta.up { color: var(--up); } .li-delta.down { color: var(--sage-deep); } .li-delta.same { color: var(--muted); }
.li-weight { font-size: 1.1rem; font-weight: 200; }
.del-btn { background: none; border: none; color: rgba(181,201,192,0.5); cursor: pointer; padding: 3px 5px; border-radius: 6px; font-size: 0.7rem; transition: color 0.15s, background 0.15s; }
.del-btn:hover { color: var(--up); background: rgba(184,50,50,0.08); }
.empty { text-align: center; color: var(--muted); font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; padding: 12px 0; }
.goal-timeframe-row { display: flex; gap: 4px; background: rgba(181,201,192,0.15); border-radius: 30px; padding: 3px; border: 1px solid var(--border-inner); margin-bottom: 14px; }
.tf-pill { flex: 1; font-family: var(--font); font-size: 0.56rem; letter-spacing: 0.08em; padding: 5px 4px; border-radius: 24px; border: none; background: none; color: var(--muted); cursor: pointer; transition: background 0.16s, color 0.16s; white-space: nowrap; }
.tf-pill.active { background: rgba(255,255,255,0.55); color: var(--ink); box-shadow: 0 1px 5px rgba(92,140,128,0.14); }
.custom-range { margin-bottom: 14px; animation: fadeUp 0.2s ease both; }
.custom-range-inner { display: flex; align-items: center; gap: 8px; }
.cr-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.cr-label { font-size: 0.52rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.cr-field input[type="date"] { font-family: var(--font); font-size: 0.72rem; color: var(--ink); background: rgba(255,255,255,0.28); border: 1px solid var(--border-inner); border-radius: 9px; padding: 6px 8px; outline: none; width: 100%; -webkit-appearance: none; }
.cr-field input[type="date"]:focus { border-color: var(--sage-deep); }
.cr-sep { font-size: 0.75rem; color: var(--muted); margin-top: 16px; flex-shrink: 0; }
.goal-row { display: flex; align-items: center; gap: 10px; }
.goal-field { flex: 1; display: flex; align-items: baseline; gap: 6px; border-bottom: 1.5px solid rgba(181,201,192,0.5); padding-bottom: 8px; }
.goal-field input[type="number"] { font-family: var(--font); font-weight: 200; font-size: 2rem; color: #ffffff; background: none; border: none; outline: none; width: 100%; -moz-appearance: textfield; caret-color: var(--sage-deep); }
.goal-field input[type="number"]::-webkit-outer-spin-button, .goal-field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
.goal-field input[type="number"]::placeholder { color: rgba(181,201,192,0.4); }
.goal-btn { padding: 9px 18px; background: var(--sage-deep); color: #fff; border: none; border-radius: 11px; font-family: var(--font); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, transform 0.12s; white-space: nowrap; box-shadow: 0 3px 12px rgba(92,140,128,0.24); }
.goal-btn:hover { background: #4d7a6e; } .goal-btn:active { transform: scale(0.97); }
#goalsList { display: flex; flex-direction: column; gap: 7px; margin-top: 0; }
.goal-current { display: flex; justify-content: space-between; align-items: center; padding: 10px 13px; background: var(--sage-faint); border: 1px solid var(--border-inner); border-radius: 12px; margin-top: 10px; animation: fadeUp 0.2s ease both; }
.gc-info { display: flex; flex-direction: column; gap: 2px; }
.gc-label { font-size: 0.54rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.gc-val { font-size: 1.1rem; font-weight: 200; color: #fff; }
.gc-right { display: flex; align-items: center; gap: 8px; }
.gc-deadline { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.08em; text-align: right; }
.goal-clear-btn { background: none; border: none; color: rgba(181,201,192,0.45); cursor: pointer; font-size: 0.7rem; padding: 3px 5px; border-radius: 6px; transition: color 0.15s, background 0.15s; }
.goal-clear-btn:hover { color: var(--up); background: rgba(184,50,50,0.08); }
.wk-check { font-size: 0.95rem; margin-left: 6px; display: inline-block; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes popIn { from { opacity:0; transform:scale(0.4); } to { opacity:1; transform:scale(1); } }
.toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(70px); background: rgba(30,45,41,0.92); backdrop-filter: blur(12px); color: rgba(255,255,255,0.92); padding: 10px 22px; border-radius: 40px; font-family: var(--font); font-size: 0.63rem; letter-spacing: 0.14em; text-transform: uppercase; transition: transform 0.36s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; pointer-events: none; white-space: nowrap; border: 1px solid rgba(181,201,192,0.2); }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div class="greeting"><div class="greeting-text" id="greetingText">Good morning</div></div>
  <div class="card">
    <div class="card-label">Log entry</div>
    <div class="date-row">
      <label onclick="snapToToday()" title="Tap to reset to today">Date</label>
      <input type="date" id="dateInput" />
    </div>
    <div class="weight-field">
      <input type="number" id="weightInput" placeholder="0.0" step="0.1" min="1" max="999" inputmode="decimal" />
      <span class="unit">lbs</span>
    </div>
    <button class="log-btn" onclick="logWeight()">Log Weight</button>
    <div class="stat-pair" id="statPair" style="display:none">
      <div class="stat-box" id="todayBox" style="display:none">
        <div class="sb-label">Today</div><div class="sb-val" id="todayVal">—</div><div class="sb-delta" id="todayDelta"></div>
      </div>
      <div class="stat-box" id="yestBox" style="display:none">
        <div class="sb-label">Yesterday</div><div class="sb-val" id="yestVal">—</div><div class="sb-delta" id="yestDelta"></div>
      </div>
    </div>
  </div>
  <div class="card graph-card">
    <div class="graph-header">
      <div class="graph-title">Progress</div>
      <div class="range-pills">
        <button class="range-pill" onclick="setRange(this,7)">1W</button>
        <button class="range-pill active" onclick="setRange(this,30)">1M</button>
        <button class="range-pill" onclick="setRange(this,90)">3M</button>
        <button class="range-pill" onclick="setRange(this,180)">6M</button>
        <button class="range-pill" onclick="setRange(this,365)">1Y</button>
        <button class="range-pill" onclick="setRange(this,1825)">5Y</button>
        <button class="range-pill" onclick="setRange(this,3650)">10Y</button>
      </div>
    </div>
    <div class="graph-stats" id="graphStats"></div>
    <div class="chart-box"><canvas id="weightChart"></canvas></div>
  </div>
  <div class="card">
    <div class="card-label">Weekly averages</div>
    <div class="week-list" id="weekList"><div class="empty">No data yet</div></div>
  </div>
  <div class="card">
    <div class="card-label">Goal</div>
    <div class="goal-timeframe-row">
      <button class="tf-pill active" data-tf="weekly" onclick="setTimeframe(this,'weekly')">Weekly</button>
      <button class="tf-pill" data-tf="monthly" onclick="setTimeframe(this,'monthly')">Monthly</button>
      <button class="tf-pill" data-tf="yearly" onclick="setTimeframe(this,'yearly')">Yearly</button>
      <button class="tf-pill" data-tf="custom" onclick="setTimeframe(this,'custom')">Custom</button>
    </div>
    <div class="custom-range" id="customRange" style="display:none">
      <div class="custom-range-inner">
        <div class="cr-field"><label class="cr-label">From</label><input type="date" id="goalStart" /></div>
        <span class="cr-sep">→</span>
        <div class="cr-field"><label class="cr-label">To</label><input type="date" id="goalEnd" /></div>
      </div>
    </div>
    <div class="goal-row">
      <div class="goal-field">
        <input type="number" id="goalInput" placeholder="0.0" step="0.1" min="1" max="999" inputmode="decimal" />
        <span class="unit">lbs</span>
      </div>
      <button class="goal-btn" onclick="saveGoal()">Set</button>
    </div>
    <div id="goalsList"></div>
  </div>
  <div class="card">
    <div class="log-collapsed" onclick="toggleLog()">
      <div>
        <div class="lc-label">Last logged</div>
        <div class="lc-date" id="lastLogDate">—</div>
        <div class="lc-time" id="lastLogTime"></div>
      </div>
      <div class="lc-right">
        <div class="lc-weight" id="lastLogWeight">—</div>
        <div class="toggle-icon" id="toggleIcon">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <path d="M2 4L5.5 7.5L9 4" stroke="#5C8C80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>
    <div class="log-expanded" id="logExpanded">
      <div class="log-inner" id="logInner"><div class="empty">No entries yet</div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const KEY = 'wt_v3';
let currentRange = 30, chartInstance = null, logOpen = false;
const load = () => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } };
const save = arr => localStorage.setItem(KEY, JSON.stringify(arr));
const pad = n => String(n).padStart(2,'0');
function todayKey() { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function yesterdayKey() { const d = new Date(); d.setDate(d.getDate()-1); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function parseKey(k) { const [y,m,d] = k.split('-').map(Number); return new Date(y,m-1,d); }
function fmtShort(k) { return parseKey(k).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtFull(k) { return parseKey(k).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}); }
function fmtDow(k) { return parseKey(k).toLocaleDateString('en-US',{weekday:'short'}); }
function weekSunKey(k) { const d=parseKey(k),s=new Date(d); s.setDate(d.getDate()-d.getDay()); return `${s.getFullYear()}-${pad(s.getMonth()+1)}-${pad(s.getDate())}`; }
function weekLabel(sk) { const s=parseKey(sk),e=new Date(s); e.setDate(s.getDate()+6); const f=dt=>dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); return `${f(s)} \u2013 ${f(e)}`; }
function initDateInput() { const el=document.getElementById('dateInput'); el.value=todayKey(); el.max=todayKey(); }
document.addEventListener('DOMContentLoaded',()=>{ initDateInput(); document.getElementById('dateInput').addEventListener('change',()=>{ const dateKey=document.getElementById('dateInput').value,entries=load(),existing=entries.find(e=>e.date===dateKey); document.getElementById('weightInput').value=existing?existing.weight.toFixed(1):''; }); });
function snapToToday() { const el=document.getElementById('dateInput'); el.value=todayKey(); const entries=load(),existing=entries.find(e=>e.date===todayKey()); document.getElementById('weightInput').value=existing?existing.weight.toFixed(1):''; showToast('Reset to today'); }
const GOAL_KEY='wt_goals_v3'; let currentTimeframe='weekly';
function loadGoals() { try { return JSON.parse(localStorage.getItem(GOAL_KEY))||[]; } catch { return []; } }
function loadGoal() { const goals=loadGoals(); return goals.length?goals[0].weight:null; }
function saveGoals(arr) { localStorage.setItem(GOAL_KEY,JSON.stringify(arr)); }
function setTimeframe(btn,tf) { currentTimeframe=tf; document.querySelectorAll('.tf-pill').forEach(p=>p.classList.remove('active')); btn.classList.add('active'); document.getElementById('customRange').style.display=tf==='custom'?'block':'none'; }
function saveGoal() {
  const val=parseFloat(document.getElementById('goalInput').value);
  if(isNaN(val)||val<=0||val>999){showToast('Enter a valid goal');return;}
  const weight=parseFloat(val.toFixed(1)); let start=null,end=null; const today=todayKey();
  if(currentTimeframe==='weekly'){start=weekSunKey(today);const s=parseKey(start),e2=new Date(s);e2.setDate(s.getDate()+6);end=`${e2.getFullYear()}-${pad(e2.getMonth()+1)}-${pad(e2.getDate())}`;}
  else if(currentTimeframe==='monthly'){const d=new Date();start=`${d.getFullYear()}-${pad(d.getMonth()+1)}-01`;const last=new Date(d.getFullYear(),d.getMonth()+1,0);end=`${last.getFullYear()}-${pad(last.getMonth()+1)}-${pad(last.getDate())}`;}
  else if(currentTimeframe==='yearly'){const y=new Date().getFullYear();start=`${y}-01-01`;end=`${y}-12-31`;}
  else{start=document.getElementById('goalStart').value;end=document.getElementById('goalEnd').value;if(!start||!end){showToast('Set a start and end date');return;}if(end<start){showToast('End must be after start');return;}}
  const goals=loadGoals(); goals.push({id:Date.now(),weight,timeframe:currentTimeframe,start,end}); saveGoals(goals);
  document.getElementById('goalInput').value=''; renderGoal(); renderWeekly(load()); showToast(`Goal set \u00b7 ${weight.toFixed(1)} lbs`);
}
function deleteGoal(id) { const goals=loadGoals().filter(g=>g.id!==id); saveGoals(goals); renderGoal(); renderWeekly(load()); showToast('Goal removed'); }
function goalDeadlineText(end) { if(!end)return''; const endDate=parseKey(end),today=new Date(); today.setHours(0,0,0,0); const diff=Math.round((endDate-today)/86400000); if(diff<0)return'Ended '+fmtShort(end); if(diff===0)return'Ends today'; if(diff===1)return'1 day left'; return `${diff} days left`; }
function renderGoal() { const goals=loadGoals(),container=document.getElementById('goalsList'),labels={weekly:'Weekly',monthly:'Monthly',yearly:'Yearly',custom:'Custom'}; if(!goals.length){container.innerHTML='';return;} container.innerHTML=goals.map(g=>`<div class="goal-current"><div class="gc-info"><span class="gc-label">${labels[g.timeframe]||'Goal'}</span><span class="gc-val">${g.weight.toFixed(1)} lbs</span></div><div class="gc-right"><span class="gc-deadline">${goalDeadlineText(g.end)}</span><button class="goal-clear-btn" onclick="deleteGoal(${g.id})">\u2715</button></div></div>`).join(''); }
function setRange(btn,days) { currentRange=days; document.querySelectorAll('.range-pill').forEach(p=>p.classList.remove('active')); btn.classList.add('active'); renderChart(load()); }
function renderChart(entries) {
  const ctx=document.getElementById('weightChart').getContext('2d'),cutoff=new Date(); cutoff.setDate(cutoff.getDate()-currentRange);
  const sorted=[...entries].sort((a,b)=>a.date.localeCompare(b.date)).filter(e=>parseKey(e.date)>=cutoff);
  const statsEl=document.getElementById('graphStats');
  if(sorted.length>=2){const first=sorted[0].weight,last=sorted[sorted.length-1].weight,diff=(last-first).toFixed(1),sign=diff>0?'+':'',col=diff>0?'var(--up)':diff<0?'#ffffff':'var(--muted)'; statsEl.innerHTML=`<div><div class="gs-label">Current</div><div class="gs-val">${last.toFixed(1)} <span class="gs-unit">lbs</span></div></div><div><div class="gs-label">Change</div><div class="gs-val" style="color:${col}">${sign}${diff} <span class="gs-unit" style="color:${col}">lbs</span></div></div>`;}
  else{statsEl.innerHTML='';}
  const labels=sorted.map(e=>fmtShort(e.date)),data=sorted.map(e=>e.weight);
  if(chartInstance)chartInstance.destroy();
  chartInstance=new Chart(ctx,{type:'line',data:{labels,datasets:[{data,borderColor:'#5C8C80',backgroundColor:ctx2=>{const g=ctx2.chart.ctx.createLinearGradient(0,0,0,195);g.addColorStop(0,'rgba(181,201,192,0.48)');g.addColorStop(1,'rgba(181,201,192,0.0)');return g;},borderWidth:2,pointRadius:data.length<=14?4:data.length<=60?2:0,pointBackgroundColor:'#5C8C80',pointBorderColor:'rgba(255,255,255,0.7)',pointBorderWidth:1.5,tension:0.4,fill:true}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(30,45,41,0.9)',titleFont:{family:"'Noto Sans Math','Noto Sans',sans-serif",size:10,weight:'300'},bodyFont:{family:"'Noto Sans Math','Noto Sans',sans-serif",size:14,weight:'200'},padding:12,cornerRadius:12,titleColor:'rgba(181,201,192,0.85)',bodyColor:'#fff',callbacks:{label:c=>` ${c.parsed.y.toFixed(1)} lbs`}}},scales:{x:{grid:{display:false},border:{display:false},ticks:{font:{family:"'Noto Sans Math','Noto Sans',sans-serif",size:9,weight:'200'},color:'rgba(122,158,151,0.8)',maxTicksLimit:5,maxRotation:0}},y:{grid:{color:'rgba(181,201,192,0.2)'},border:{display:false},ticks:{font:{family:"'Noto Sans Math','Noto Sans',sans-serif",size:9,weight:'200'},color:'rgba(122,158,151,0.8)',callback:v=>v.toFixed(0),maxTicksLimit:4,padding:8}}}}});
}
function toggleWeek(sunKey) { const entriesEl=document.getElementById(`we-${sunKey}`),chevron=document.getElementById(`wc-${sunKey}`),isOpen=entriesEl.classList.contains('open'); entriesEl.classList.toggle('open',!isOpen); chevron.classList.toggle('open',!isOpen); }
function renderWeekly(entries) {
  const el=document.getElementById('weekList'); if(!entries.length){el.innerHTML='<div class="empty">No data yet</div>';return;}
  const goals=loadGoals(),map={};
  entries.forEach(e=>{const k=weekSunKey(e.date);if(!map[k])map[k]=[];map[k].push(e);});
  const sorted=Object.keys(map).sort((a,b)=>b.localeCompare(a)).slice(0,8);
  el.innerHTML=sorted.map(k=>{
    const weekEntries=map[k],weights=weekEntries.map(e=>e.weight),rawAvg=weights.reduce((a,b)=>a+b,0)/weights.length,avg=rawAvg.toFixed(1);
    const wEnd=new Date(parseKey(k));wEnd.setDate(wEnd.getDate()+6);const weekEnd=`${wEnd.getFullYear()}-${pad(wEnd.getMonth()+1)}-${pad(wEnd.getDate())}`;
    const hit=goals.some(g=>{const overlaps=(!g.start||g.start<=weekEnd)&&(!g.end||g.end>=k);return overlaps&&rawAvg>=g.weight&&rawAvg<g.weight+1;});
    const checkHtml=hit?`<span class="wk-check" title="Goal hit!">\u2705</span>`:'';
    const dayItems=[...weekEntries].sort((a,b)=>b.date.localeCompare(a.date)).map(e=>`<div class="wk-entry-item"><div><div class="wk-entry-date">${fmtShort(e.date)}</div><div class="wk-entry-dow">${fmtDow(e.date)}</div></div><div class="wk-entry-weight">${e.weight.toFixed(1)} lbs</div></div>`).join('');
    return `<div class="week-row"><div class="week-row-header" onclick="toggleWeek('${k}')"><div><div class="wk-label">${weekLabel(k)}${checkHtml}</div><div class="wk-count">${weights.length} entr${weights.length===1?'y':'ies'}</div></div><div style="display:flex;align-items:center;gap:10px"><div class="wk-avg">${avg} <span>lbs avg</span></div><span class="wk-chevron" id="wc-${k}">\u25be</span></div></div><div class="week-entries" id="we-${k}"><div class="week-entry-list">${dayItems}</div></div></div>`;
  }).join('');
}
function renderLastLog(entries) { const sorted=[...entries].sort((a,b)=>b.date.localeCompare(a.date)),latest=sorted[0]; document.getElementById('lastLogDate').textContent=latest?fmtFull(latest.date):'No entries'; document.getElementById('lastLogWeight').textContent=latest?`${latest.weight.toFixed(1)} lbs`:'—'; document.getElementById('lastLogTime').textContent=(latest&&latest.time)?`Logged at ${latest.time}`:''; }
function renderLogWeek(entries) {
  const inner=document.getElementById('logInner'); if(!entries.length){inner.innerHTML='<div class="empty">No entries yet</div>';return;}
  const currentWeekSun=weekSunKey(todayKey()),weekEntries=entries.filter(e=>weekSunKey(e.date)===currentWeekSun).sort((a,b)=>b.date.localeCompare(a.date));
  if(!weekEntries.length){inner.innerHTML='<div class="empty">No entries this week</div>';return;}
  const allSorted=[...entries].sort((a,b)=>a.date.localeCompare(b.date));
  const itemsHtml=weekEntries.map(e=>{const idx=allSorted.findIndex(x=>x.date===e.date);let dHtml='';if(idx>0){const d=(e.weight-allSorted[idx-1].weight).toFixed(1),cls=d>0?'up':d<0?'down':'same';dHtml=`<span class="li-delta ${cls}">${d>0?'+':''}${d}</span>`;}return `<div class="log-item"><div><div class="li-date">${fmtShort(e.date)}${e.time?`<span class="li-time"> \u00b7 ${e.time}</span>`:''}</div><div class="li-dow">${fmtDow(e.date)}</div></div><div class="li-right">${dHtml}<div class="li-weight">${e.weight.toFixed(1)} lbs</div><button class="del-btn" onclick="deleteEntry('${e.date}',event)">\u2715</button></div></div>`;}).join('');
  inner.innerHTML=`<div class="log-week-header">${weekLabel(currentWeekSun)}</div><div class="log-week-group">${itemsHtml}</div>`;
}
function renderStatPair(entries) {
  const pair=document.getElementById('statPair'),todayBox=document.getElementById('todayBox'),yestBox=document.getElementById('yestBox'),tk=todayKey(),yk=yesterdayKey(),todayEntry=entries.find(e=>e.date===tk),yestEntry=entries.find(e=>e.date===yk),allSorted=[...entries].sort((a,b)=>a.date.localeCompare(b.date));
  if(todayEntry){todayBox.style.display='block';document.getElementById('todayVal').textContent=`${todayEntry.weight.toFixed(1)} lbs`;const idx=allSorted.findIndex(e=>e.date===tk),deltaEl=document.getElementById('todayDelta');if(idx>0){const d=(todayEntry.weight-allSorted[idx-1].weight).toFixed(1);deltaEl.textContent=`${d>0?'+':''}${d} vs prev`;deltaEl.className=`sb-delta ${d>0?'up':d<0?'down':'same'}`;}else{deltaEl.textContent='First entry';deltaEl.className='sb-delta none';}}else{todayBox.style.display='none';}
  if(yestEntry){yestBox.style.display='block';document.getElementById('yestVal').textContent=`${yestEntry.weight.toFixed(1)} lbs`;const idx=allSorted.findIndex(e=>e.date===yk),deltaEl=document.getElementById('yestDelta');if(idx>0){const d=(yestEntry.weight-allSorted[idx-1].weight).toFixed(1);deltaEl.textContent=`${d>0?'+':''}${d} vs prev`;deltaEl.className=`sb-delta ${d>0?'up':d<0?'down':'same'}`;}else{deltaEl.textContent='First entry';deltaEl.className='sb-delta none';}}else{yestBox.style.display='none';}
  pair.style.display=(todayEntry||yestEntry)?'flex':'none';
}
function greeting() { const h=new Date().getHours(); if(h<12)return'Good morning'; if(h<17)return'Good afternoon'; return'Good evening'; }
function renderAll() { const entries=load(); renderChart(entries); renderWeekly(entries); renderLastLog(entries); renderLogWeek(entries); renderStatPair(entries); renderGoal(); }
function logWeight() {
  const weightInput=document.getElementById('weightInput'),dateKey=document.getElementById('dateInput').value||todayKey(),val=parseFloat(weightInput.value);
  if(isNaN(val)||val<=0||val>999){showToast('Enter a valid weight');return;}
  const entries=load(),idx=entries.findIndex(e=>e.date===dateKey),rounded=parseFloat(val.toFixed(1)),isToday=dateKey===todayKey(),label=isToday?'Today':fmtShort(dateKey),now=new Date(),timeStr=isToday?now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}):null;
  if(idx>=0){entries[idx].weight=rounded;if(isToday&&timeStr)entries[idx].time=timeStr;else if(!isToday)entries[idx].time=null;showToast(`${label} updated \u00b7 ${rounded.toFixed(1)} lbs`);}
  else{entries.push({date:dateKey,weight:rounded,time:timeStr});showToast(`${label} logged \u00b7 ${rounded.toFixed(1)} lbs`);}
  save(entries); weightInput.value=''; renderAll();
}
function deleteEntry(dateKey,ev) { ev.stopPropagation(); save(load().filter(e=>e.date!==dateKey)); renderAll(); showToast('Entry removed'); }
function toggleLog() { logOpen=!logOpen; document.getElementById('logExpanded').classList.toggle('open',logOpen); document.getElementById('toggleIcon').classList.toggle('open',logOpen); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
document.getElementById('weightInput').addEventListener('keydown',e=>{if(e.key==='Enter')logWeight();});
document.getElementById('goalInput').addEventListener('keydown',e=>{if(e.key==='Enter')saveGoal();});
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
window.addEventListener('load',()=>{
  document.getElementById('greetingText').textContent=greeting(); initDateInput();
  const t=todayKey(); document.getElementById('goalStart').value=t; document.getElementById('goalEnd').value=t;
  const entries=load(),today=entries.find(e=>e.date===todayKey()); if(today)document.getElementById('weightInput').placeholder=today.weight.toFixed(1);
  renderAll();
});
</script>
